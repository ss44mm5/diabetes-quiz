<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糖尿病共照網考古題測驗</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');

:root {
  --bg: #faf7f2;
  --surface: #ffffff;
  --card: #f5f0e8;
  --accent: #c0392b;
  --accent2: #e67e22;
  --correct: #27ae60;
  --wrong: #e74c3c;
  --text: #2c2c2c;
  --muted: #7f8c8d;
  --border: #ddd5c8;
  --shadow: rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image: 
    radial-gradient(circle at 20% 20%, rgba(192,57,43,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(230,126,34,0.04) 0%, transparent 50%);
}

.header {
  background: var(--accent);
  color: white;
  padding: 24px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 12px rgba(192,57,43,0.3);
}

.header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.05em;
}

.header .subtitle {
  font-size: 0.8rem;
  opacity: 0.85;
  margin-top: 4px;
}

.badge {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 0.82rem;
  white-space: nowrap;
}

.container { max-width: 820px; margin: 0 auto; padding: 32px 20px; }

/* START SCREEN */
#startScreen {
  text-align: center;
  padding: 60px 20px;
}

.start-icon {
  font-size: 4rem;
  margin-bottom: 20px;
  display: block;
}

#startScreen h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.9rem;
  color: var(--accent);
  margin-bottom: 12px;
}

#startScreen p {
  color: var(--muted);
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 8px;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin: 32px 0;
}

.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 2px 8px var(--shadow);
}

.info-card .num {
  font-family: 'Noto Serif TC', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--accent);
}

.info-card .label {
  font-size: 0.82rem;
  color: var(--muted);
  margin-top: 4px;
}

.btn {
  display: inline-block;
  padding: 14px 40px;
  border-radius: 8px;
  font-size: 1rem;
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 4px 14px rgba(192,57,43,0.35);
}

.btn-primary:hover { background: #a93226; transform: translateY(-1px); }

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1.5px solid var(--border);
}

.btn-secondary:hover { background: var(--card); }

/* PROGRESS */
.progress-bar {
  height: 5px;
  background: var(--border);
  border-radius: 3px;
  margin-bottom: 28px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.4s ease;
}

.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 8px;
}

/* QUESTION CARD */
.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 4px 20px var(--shadow);
  margin-bottom: 20px;
}

.q-num {
  font-size: 0.78rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
}

.q-text {
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 28px;
  border-left: 3px solid var(--accent);
  padding-left: 16px;
}

.options { display: flex; flex-direction: column; gap: 10px; }

.option {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 18px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.18s;
  background: var(--bg);
  text-align: left;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--text);
  width: 100%;
}

.option:hover:not(:disabled) {
  border-color: var(--accent);
  background: #fdf0ee;
  transform: translateX(3px);
}

.option .opt-key {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--card);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.82rem;
  margin-top: 1px;
}

.option.correct {
  border-color: var(--correct);
  background: #eafaf1;
}
.option.correct .opt-key {
  background: var(--correct);
  border-color: var(--correct);
  color: white;
}

.option.wrong {
  border-color: var(--wrong);
  background: #fdedec;
}
.option.wrong .opt-key {
  background: var(--wrong);
  border-color: var(--wrong);
  color: white;
}

.option:disabled { cursor: default; }

.feedback {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 0.88rem;
  line-height: 1.6;
  display: none;
}

.feedback.show { display: block; }
.feedback.correct-fb { background: #eafaf1; border: 1px solid #a9dfbf; color: #1e8449; }
.feedback.wrong-fb { background: #fdedec; border: 1px solid #f5b7b1; color: #922b21; }

.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
  gap: 12px;
}

/* RESULT SCREEN */
#resultScreen { text-align: center; padding: 40px 20px; }

.score-circle {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  margin: 0 auto 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 6px solid;
  position: relative;
}

.score-circle .score-num {
  font-family: 'Noto Serif TC', serif;
  font-size: 2.8rem;
  font-weight: 700;
  line-height: 1;
}

.score-circle .score-den {
  font-size: 0.9rem;
  color: var(--muted);
  margin-top: 4px;
}

.result-grade {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.6rem;
  margin-bottom: 8px;
}

.result-msg {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 32px;
}

.result-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}

.stat-card .stat-num {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.8rem;
  font-weight: 700;
}

.stat-card .stat-label {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 4px;
}

.review-section {
  text-align: left;
  margin-top: 32px;
}

.review-section h3 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.1rem;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
  color: var(--accent);
}

.review-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 12px;
  border-left: 4px solid;
}

.review-item.r-correct { border-left-color: var(--correct); }
.review-item.r-wrong { border-left-color: var(--wrong); }

.review-item .r-q { font-size: 0.9rem; line-height: 1.7; margin-bottom: 10px; color: var(--text); }
.review-item .r-ans { font-size: 0.83rem; color: var(--muted); }
.review-item .r-ans span { font-weight: 600; }
.review-item .r-ans .correct-ans { color: var(--correct); }
.review-item .r-ans .wrong-ans { color: var(--wrong); }

.hidden { display: none; }

@media (max-width: 600px) {
  .info-grid, .result-stats { grid-template-columns: 1fr 1fr; }
  .question-card { padding: 20px; }
  .header { padding: 16px 20px; }
  .header h1 { font-size: 1.15rem; }
}
</style>
  <meta name="application-name" content="糖尿病考古題測驗">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="糖尿病測驗">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#c0392b">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(()=>{});
    }
  </script>
</head>
<body>

<div class="header">
  <div>
    <h1>🏥 糖尿病共照網考古題測驗</h1>
    <div class="subtitle">Diabetes Shared Care Network — Practice Quiz</div>
  </div>
</div>

<div class="container">
  <!-- START -->
  <div id="startScreen">
    <span class="start-icon">📋</span>
    <h2>準備好了嗎？</h2>
    <p>本系統從考古題題庫中隨機抽出 50 題進行測驗</p>
    <p>每題選擇後立即顯示正確答案，完成後輸出詳細成績</p>

    <div class="info-grid">
      <div class="info-card">
        <div class="num" id="totalQNum">—</div>
        <div class="label">題庫總題數</div>
      </div>
      <div class="info-card">
        <div class="num">50</div>
        <div class="label">本次測驗題數</div>
      </div>
      <div class="info-card">
        <div class="num">即時</div>
        <div class="label">答題回饋</div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="startQuiz()">開始測驗</button>
  </div>

  <!-- QUIZ -->
  <div id="quizScreen" class="hidden">
    <div class="progress-text">
      <span id="progressLabel">第 1 題，共 50 題</span>
      <span id="scoreLabel">得分：0 / 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="question-card">
      <div class="q-num" id="qNum">題目 1 / 50</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="nav-row">
      <button class="btn btn-secondary" onclick="skipQuestion()">略過此題</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">下一題 →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="resultScreen" class="hidden">
    <div class="score-circle" id="scoreCircle">
      <div class="score-num" id="finalScore">—</div>
      <div class="score-den" id="finalDen">/ 50</div>
    </div>
    <div class="result-grade" id="resultGrade"></div>
    <div class="result-msg" id="resultMsg"></div>

    <div class="result-stats">
      <div class="stat-card">
        <div class="stat-num" style="color:var(--correct)" id="correctCount">—</div>
        <div class="stat-label">✅ 答對題數</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--wrong)" id="wrongCount">—</div>
        <div class="stat-label">❌ 答錯題數</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--muted)" id="skipCount">—</div>
        <div class="stat-label">⏭ 略過題數</div>
      </div>
    </div>

    <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:32px;">
      <button class="btn btn-primary" onclick="restartQuiz()">再測一次</button>
      <button class="btn btn-secondary" onclick="toggleReview()">查看錯題 / 回顧</button>
    </div>

    <div class="review-section" id="reviewSection" style="display:none">
      <h3>📝 答題回顧（僅顯示答錯及略過題目）</h3>
      <div id="reviewList"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 題庫 — 第一部分：第 1–200 題
// 格式：{ q: 題目, opts: [A,B,C,D], ans: 'A'|'B'|'C'|'D' }
// ============================================================
const QUESTIONS = [
  // 1
  { q: "有關血脂治療藥物的相關敘述，下列何者錯誤？\nA. statin藥物藉由競爭抑制HMG-CoA還原酶，使肝臟內生膽固醇減少；而膽酸結合劑的作用是在腸中與膽汁酸結合，減少膽固醇製造。\nB. 膽酸結合劑是唯一會增加TG的降血脂藥物，TG＞400 mg/dL時是禁忌症。\nC. statin藥物在妊娠和哺乳的女性中，可謹慎使用。\nD. 服用statin藥物患者出現肌肉無力、壓痛、疼痛時，應檢查血清肌酸酐激酶。",
    opts:["statin抑制HMG-CoA，膽酸結合劑在腸中與膽汁酸結合","膽酸結合劑唯一會增加TG，TG>400禁忌","statin在妊娠和哺乳中可謹慎使用","出現肌肉症狀應檢查肌酸酐激酶"], ans:'C' },
  // 2
  { q: "有關糖尿病腎臟病變，何者為誤？\nA. 早期糖尿病腎臟病變臨床上沒有症狀\nB. 微量白蛋白尿期腎臟已有結構上改變，顯現較嚴重臨床症狀\nC. 明顯蛋白尿期腎絲球過濾率會升高\nD. 末期糖尿病腎臟病變較同程度腎功能不全之非糖尿病腎臟病變者預後差",
    opts:["早期無症狀","微量白蛋白尿期已有結構改變且顯現症狀","明顯蛋白尿期GFR升高","末期預後較非糖尿病腎病變差"], ans:'C' },
  // 3
  { q: "糖尿病腎臟病變防治不包括？\nA. 第1型糖尿病診斷後馬上篩檢微量白蛋白尿\nB. 第2型糖尿病診斷後馬上篩檢微量白蛋白尿\nC. 控制高血壓\nD. 檢查及治療尿道感染",
    opts:["第1型診斷後馬上篩檢","第2型診斷後馬上篩檢","控制高血壓","檢查及治療尿道感染"], ans:'A' },
  // 4
  { q: "小美是Type 2 DM的患者，目前妊娠26週，近期血壓升高，下列懷孕期間血壓控制值哪個在控制目標範圍？\nA. 收縮壓160，舒張壓120\nB. 收縮壓140，舒張壓100\nC. 收縮壓115，舒張壓70\nD. 收縮壓100，舒張壓60",
    opts:["160/120 mmHg","140/100 mmHg","115/70 mmHg","100/60 mmHg"], ans:'C' },
  // 5
  { q: "以100公克OGTT診斷妊娠性糖尿病，測空腹、1、2、3小時血漿糖，下列閾值何者為非？\nA. 空腹95 mg/dL\nB. 1小時190 mg/dL\nC. 2小時155 mg/dL\nD. 3小時140 mg/dL",
    opts:["空腹95 mg/dL","1小時190 mg/dL","2小時155 mg/dL","3小時140 mg/dL"], ans:'B' },
  // 6
  { q: "對第2型糖尿病兒童藥物治療，下列何者錯誤？\nA. 10歲以下兒童，雙胍類是絕對安全而有效的\nB. 除雙胍類外，尚無其他口服藥物為FDA認可供小兒科使用\nC. 合理推測成人降血糖藥物對兒童應有效\nD. 未確認是否為第2型糖尿病的高血糖，先用胰島素治療",
    opts:["10歲以下絕對安全有效","除雙胍類外無其他FDA認可","推測成人藥物對兒童有效","未確認先用胰島素"], ans:'A' },
  // 7
  { q: "腹部脂肪組織會分泌多種脂肪激素，下列不屬於此類激素？\nA. 瘦素（leptin）\nB. 脂泌素（adiponectin）\nC. 抗胰島素激素（resistin）\nD. 脂解激素（lipase）",
    opts:["瘦素leptin","脂泌素adiponectin","抗胰島素激素resistin","脂解激素lipase"], ans:'D' },
  // 8
  { q: "大部分糖尿病患足部感染是由何種菌所引起的？①酵母菌 ②葡萄球菌 ③大腸桿菌 ④鏈球菌\nA. 1+2\nB. 2+3\nC. 2+4\nD. 1+3",
    opts:["酵母菌＋葡萄球菌","葡萄球菌＋大腸桿菌","葡萄球菌＋鏈球菌","酵母菌＋大腸桿菌"], ans:'C' },
  // 9
  { q: "第2型糖尿病人使用口服抗糖尿病藥加每天睡前打一針中效胰島素，若日間血糖/HbA1c增加，且夜間發生低血糖，建議如何？\nA. 減少胰島素劑量\nB. 增加口服抗糖尿病藥劑量\nC. 增加胰島素劑量\nD. 改成一天二次胰島素注射",
    opts:["減少胰島素劑量","增加口服藥劑量","增加胰島素劑量","改成一天二次胰島素注射"], ans:'D' },
  // 10
  { q: "下列有關第1型糖尿病的臨床表現，何者不正確？\nA. 體重減輕\nB. 多尿\nC. 肥胖\nD. 容易口渴",
    opts:["體重減輕","多尿","肥胖","容易口渴"], ans:'C' },
  // 11
  { q: "下列有關第1型糖尿病的治療，何者不正確？\nA. 改善生活型態\nB. 運動\nC. 口服抗糖尿病藥\nD. 使用胰島素",
    opts:["改善生活型態","運動","口服抗糖尿病藥","使用胰島素"], ans:'C' },
  // 12
  { q: "下列何種食物不利於血中LDL-C的控制？\nA. 植物奶油（瑪琪琳）\nB. 烤酥油\nC. 棕櫚核仁油\nD. 以上皆是",
    opts:["植物奶油","烤酥油","棕櫚核仁油","以上皆是"], ans:'D' },
  // 13
  { q: "空腹喝酒引起的低血糖效應可能持續至飲酒後多少小時？\nA. 2-3小時\nB. 4-5小時\nC. 5-6小時\nD. 8-12小時",
    opts:["2-3小時","4-5小時","5-6小時","8-12小時"], ans:'D' },

  { q: "有關「糖尿病患者「視力復健（vision rehabilitation）」」，下列何者正確？", opts:["視力喪失後無法復健","對因視網膜病變造成視力損傷的患者，視力復健（使用輔助工具、訓練技能）可改善生活功能","視力復健只針對先天性視障","復健效果取決於視力喪失程度，嚴重者無效"], ans:'B' },
  // 672
  { q: "有關「糖尿病患者「遠距醫療（telemedicine）」在照護中的應用」，下列何者正確？", opts:["遠距醫療不適合糖尿病照護","遠距醫療可提供便利的血糖數據回顧、藥物調整和衛教，改善照護可及性，尤其對偏遠地區患者","遠距醫療完全取代面對面診療","遠距醫療只適用於輕度糖尿病"], ans:'B' },
  // 673
  { q: "有關「糖尿病患者「Heel pressure ulcer（足跟壓瘡）」的預防」，下列何者正確？", opts:["足跟壓瘡只在長期臥床才發生","使用泡沫足跟保護墊、定期翻身、保持皮膚濕潤，可預防足跟壓瘡","足跟皮膚厚，不需特別保護","只需保持床單整潔"], ans:'B' },
  // 674
  { q: "有關「糖尿病患者「腎上腺功能不全（adrenal insufficiency）」與低血糖」，下列何者正確？", opts:["腎上腺功能不全不影響血糖","腎上腺功能不全患者因皮質醇分泌不足，可能出現低血糖，需注意藥物調整和緊急用藥","腎上腺功能不全只影響血壓","腎上腺功能不全患者血糖一定偏高"], ans:'B' },
  // 675
  { q: "有關「糖尿病患者「腎臟病變」的「磷結合劑（phosphate binders）」使用」，下列何者正確？", opts:["所有腎臟病患者均需磷結合劑","晚期CKD患者血磷升高時，才需在餐時服用磷結合劑，以控制高磷血症和繼發性副甲狀腺功能亢進","磷結合劑可隨時服用","磷結合劑對血糖有直接影響"], ans:'B' },
  // 676
  { q: "有關「糖尿病患者「心房顫動（atrial fibrillation, AF）」的管理」，下列何者正確？", opts:["AF與糖尿病無關","糖尿病患者AF風險增加，需評估抗凝血治療（如NOAC）以預防腦中風，同時管理血糖和心血管危險因子","AF對血糖無影響","AF患者不需抗凝血治療"], ans:'B' },
  // 677
  { q: "有關「糖尿病患者「腎性貧血」的「紅血球生成素（EPO）」治療」，下列何者正確？", opts:["所有糖尿病患者均需EPO","晚期CKD（eGFR<30）患者若血紅蛋白<10 g/dL且排除缺鐵等因素，可考慮EPO治療；但目標Hb不宜過高","EPO治療對糖尿病有直接降血糖效果","EPO無副作用，可大量使用"], ans:'B' },
  // 678
  { q: "有關「糖尿病患者「腎臟病變」的「碳酸氫鈉（sodium bicarbonate）補充」」，下列何者正確？", opts:["代謝性酸中毒不需處理","晚期CKD患者常出現代謝性酸中毒，口服碳酸氫鈉補充可能有助減緩腎功能惡化和改善蛋白質代謝","碳酸氫鈉可取代ACEI/ARB","所有CKD患者均需碳酸氫鈉補充"], ans:'B' },
  // 679
  { q: "有關「糖尿病患者「精神科用藥（如抗精神病藥）」對血糖的影響」，下列何者正確？", opts:["抗精神病藥對血糖無影響","部分非典型抗精神病藥（如Olanzapine、Clozapine）可引起體重增加和高血糖，使用者需監測血糖和代謝指標","所有抗精神病藥均安全","精神科用藥可改善血糖"], ans:'B' },
  // 680
  { q: "有關「糖尿病患者「腎臟病」的「Allopurinol（降尿酸藥）」使用」，下列何者正確？", opts:["Allopurinol對腎臟病無影響","部分研究顯示Allopurinol可能有腎臟保護效益，但在晚期CKD患者需調整劑量，避免副作用","Allopurinol可隨意使用","Allopurinol在所有腎功能下劑量相同"], ans:'B' },
  // 681
  { q: "有關「糖尿病患者「手術後」的「血栓預防（DVT prophylaxis）」」，下列何者正確？", opts:["糖尿病患者血栓風險不高","糖尿病是靜脈血栓的危險因子之一，手術後需評估血栓風險並依指引給予低分子肝素等預防措施","手術後不需血栓預防","血糖控制不影響血栓風險"], ans:'B' },
  // 682
  { q: "有關「糖尿病患者「超音波引導」下的注射或手術」，下列何者正確？", opts:["超音波引導對糖尿病患者無特別意義","超音波引導可提高注射或手術精準度，減少局部損傷風險，對有周邊神經病變者（感覺較差）尤為重要","超音波引導只用於腎臟手術","超音波引導會干擾血糖監測"], ans:'B' },
  // 683
  { q: "有關「糖尿病患者「Icosapent Ethyl（高純度EPA）」的心血管效益」，下列何者正確？", opts:["Icosapent Ethyl對心血管無益","REDUCE-IT試驗顯示Icosapent Ethyl（4 g/天）可顯著降低心血管事件，適用於已接受Statin且TG仍高的高風險糖尿病患者","只有Statin有心血管效益","所有魚油補充劑效果相同"], ans:'B' },
  // 684
  { q: "有關「糖尿病患者「幹細胞治療」的現況」，下列何者正確？", opts:["幹細胞治療已是糖尿病的標準治療","幹細胞治療糖尿病目前仍在研究和臨床試驗階段，尚未成為常規治療","幹細胞治療可完全治癒所有糖尿病","幹細胞治療無副作用"], ans:'B' },
  // 685
  { q: "有關「糖尿病患者「腎臟病」的「維生素D缺乏」管理」，下列何者正確？", opts:["維生素D缺乏對腎臟病無影響","CKD患者常有維生素D活化障礙，可能需補充活性維生素D（如Calcitriol）以預防次發性副甲狀腺功能亢進","所有CKD患者均需大量維生素D補充","維生素D只影響骨骼，對腎臟無影響"], ans:'B' },
  // 686
  { q: "有關「糖尿病患者「低血糖」後的「認知功能」短暫影響」，下列何者正確？", opts:["低血糖後認知功能立即恢復","低血糖後認知功能（尤其注意力和反應速度）可能短暫受損，需等血糖完全恢復後再進行高風險活動（如開車）","低血糖對認知功能無影響","只有嚴重低血糖才影響認知功能"], ans:'B' },
  // 687
  { q: "有關「糖尿病患者「腎臟病」的「透析充分性」評估」，下列何者正確？", opts:["透析充分性不需評估","透析充分性（如血液透析的Kt/V）需定期評估，以確保足夠的毒素清除，維持患者健康","透析充分性只由設備決定","糖尿病患者透析需求與非糖尿病相同"], ans:'B' },
  // 688
  { q: "有關「糖尿病患者「足部矯形鞋具」的使用」，下列何者正確？", opts:["一般運動鞋對所有糖尿病患者足部均足夠","有足部變形、神經病變或既往潰瘍的高危險患者，應使用定製治療鞋或矯形鞋以減少足底壓力","矯形鞋只在截肢後使用","足部鞋具與潰瘍預防無關"], ans:'B' },
  // 689
  { q: "有關「糖尿病患者「腎臟病」的「貧血管理」中「鐵劑補充」」，下列何者正確？", opts:["CKD貧血只需EPO治療","CKD患者在使用EPO前或同時，應評估鐵儲量（如血清鐵蛋白、TSAT），鐵缺乏者需補充鐵劑（口服或靜脈注射）","鐵劑補充對CKD貧血無效","所有CKD患者均需靜脈鐵劑"], ans:'B' },
  // 690
  { q: "有關「糖尿病患者「氧化壓力（oxidative stress）」的臨床意義」，下列何者正確？", opts:["氧化壓力與糖尿病合併症無關","高血糖引發氧化壓力增加（活性氧增多），損傷血管內皮和神經，是糖尿病大小血管合併症的重要機轉","抗氧化劑補充已證實可治療糖尿病合併症","氧化壓力只影響腎臟"], ans:'B' },
  // 691
  { q: "有關「糖尿病患者「慢性腎病」的「鎂（magnesium）」管理」，下列何者正確？", opts:["鎂對CKD患者無影響","晚期CKD患者可能出現低血鎂或高血鎂，需依腎功能監測鎂的水平並調整補充或限制","所有CKD患者需大量補充鎂","鎂與糖尿病照護無關"], ans:'B' },
  // 692
  { q: "有關「糖尿病患者「腎臟病」的「鉀（potassium）」管理」，下列何者正確？", opts:["CKD患者不需限制鉀的攝取","晚期CKD患者（尤其使用ACEI/ARB者）需監測血鉀，避免高鉀血症；必要時限制高鉀食物","鉀對腎臟病患者有益，應大量攝取","所有糖尿病患者均需限鉀"], ans:'B' },
  // 693
  { q: "有關「糖尿病患者「心理健康」的「正念冥想（mindfulness）」應用」，下列何者正確？", opts:["正念冥想對糖尿病無效","正念冥想可幫助糖尿病患者減少壓力、改善情緒調適，部分研究顯示可改善血糖控制","正念冥想可取代所有藥物","正念冥想只適用於有宗教信仰者"], ans:'B' },
  // 694
  { q: "有關「糖尿病患者「高血糖危象」的「碳酸氫鈉（NaHCO3）」使用時機」，下列何者正確？", opts:["所有DKA患者均需補充NaHCO3","NaHCO3只在pH<6.9的嚴重酸中毒患者考慮使用，一般DKA不需常規補充","NaHCO3可加速DKA恢復","HHS患者需常規補充NaHCO3"], ans:'B' },
  // 695
  { q: "有關「糖尿病患者「連續血糖監測（CGM）」的「警示閾值」設定」，下列何者正確？", opts:["所有患者使用相同的警示閾值","警示閾值應依患者的低血糖風險、活動型態和個人偏好個別化設定，避免過多警示造成「警示疲乏」","警示閾值越低越安全","警示閾值由廠商決定，無法調整"], ans:'B' },
  // 696
  { q: "有關「糖尿病患者「足部骨骼」的「夏科氏足（Charcot foot）」」，下列何者正確？", opts:["夏科氏足不影響功能","夏科氏足是嚴重神經病變引起的進行性骨關節破壞，急性期需立即減壓（全接觸石膏）以防止畸形惡化","夏科氏足只需觀察","夏科氏足只在第1型糖尿病出現"], ans:'B' },
  // 697
  { q: "有關「糖尿病患者「腸泌素效應」的「臨床應用」」，下列何者正確？", opts:["腸泌素效應在第2型糖尿病中正常","DPP-4抑制劑和GLP-1 RA均利用腸泌素效應，但前者維持並延長內源性GLP-1作用，後者直接激活GLP-1受體","腸泌素效應只影響胰島素分泌","DPP-4抑制劑和GLP-1 RA作用機轉完全相同"], ans:'B' },
  // 698
  { q: "有關「糖尿病患者「胰島細胞自體免疫」的評估」，下列何者正確？", opts:["自體免疫標記評估對所有糖尿病患者必要","對診斷不確定的患者（如瘦型第2型或成人潛伏性自體免疫糖尿病LADA），評估GAD65抗體等有助分型","自體免疫標記陰性可完全排除第1型糖尿病","自體免疫標記評估沒有臨床意義"], ans:'B' },
  // 699
  { q: "有關「糖尿病患者「急性胰臟炎」與血糖管理」，下列何者正確？", opts:["急性胰臟炎對血糖無影響","急性胰臟炎可引起高血糖（應激性或胰島素分泌減少），且GLP-1 RA和DPP-4抑制劑可能與胰臟炎有關聯（需謹慎）","急性胰臟炎期間可繼續所有降血糖藥","GLP-1 RA是急性胰臟炎的治療首選"], ans:'B' },
  // 700
  { q: "有關「糖尿病患者「腎臟」的「草酸（oxalate）」管理」，下列何者正確？", opts:["草酸對腎臟無影響","高草酸飲食（如菠菜、堅果）可增加草酸鈣結石風險，腎功能不全的糖尿病患者需適量攝取","所有腎臟病患者需完全避免草酸食物","草酸與糖尿病照護無關"], ans:'B' },
  // 701
  { q: "有關「糖尿病患者「自我管理」的「動機維持」策略」，下列何者最有效？", opts:["強制患者執行自我管理","設定短期可達成的目標、慶祝小成功、持續社會支持，是維持長期自我管理動機的有效策略","只靠意志力維持動機","忽略挫折，只專注成功"], ans:'B' },
  // 702
  { q: "有關「糖尿病患者「腎臟病」的「睡眠問題」」，下列何者正確？", opts:["CKD患者睡眠問題與腎功能無關","CKD患者常見睡眠障礙（如不寧腿症候群、睡眠呼吸中止症），影響生活品質和血糖控制，需積極評估和治療","睡眠問題只在透析患者出現","CKD患者睡眠問題不需處理"], ans:'B' },
  // 703
  { q: "有關「糖尿病患者「腎臟病」的「高磷血症」與「血管鈣化」的關係」，下列何者正確？", opts:["高磷血症對血管無影響","高磷血症可促進血管鈣化，增加CKD患者的心血管死亡風險，需積極控制血磷","只有鈣才影響血管鈣化","血管鈣化只在終末期腎病出現"], ans:'B' },
  // 704
  { q: "有關「糖尿病患者「體重管理」的「行為策略」」，下列何者最有效？", opts:["只靠意志力控制飲食","結合自我監測飲食和體重、設定具體行為目標、解決問題技能和社會支持，是最有效的行為策略","只靠藥物","完全依賴外部監督"], ans:'B' },
  // 705
  { q: "有關「糖尿病患者「胰島素治療」的「恐針（needle phobia）」處理」，下列何者正確？", opts:["恐針不是臨床問題","恐針影響患者接受胰島素治療，需透過心理支持、針頭選擇（更細更短）和技術指導來克服","所有患者都能克服恐針","恐針患者應強制進行注射"], ans:'B' },
  // 706
  { q: "有關「糖尿病患者「大量蛋白尿（>500 mg/day）」的臨床意義」，下列何者正確？", opts:["大量蛋白尿不影響預後","大量蛋白尿是腎功能快速惡化和心血管疾病的獨立危險因子，需積極治療（ACEI/ARB、血壓和血糖控制）","大量蛋白尿只需觀察","蛋白尿不影響血糖管理"], ans:'B' },
  // 707
  { q: "有關「糖尿病患者「腎臟病」的「藥物劑量調整」原則」，下列何者正確？", opts:["腎功能不全時所有藥物劑量不變","腎功能不全（eGFR下降）時，由腎臟排泄的藥物（包括降血糖藥和其他用藥）需依eGFR調整劑量或頻率以避免蓄積","所有藥物均由肝臟代謝，與腎功能無關","只有胰島素需在腎功能不全時調整"], ans:'B' },
  // 708
  { q: "有關「糖尿病患者「高血糖的「多尿（polyuria）」機轉」，下列何者正確？", opts:["多尿是因為腎臟過濾血糖增加了血液量","高血糖超過腎糖閾值（約180 mg/dL）導致尿糖，高滲尿引起滲透性利尿，造成多尿","多尿只在第1型糖尿病發生","多尿是因為飲水量增加"], ans:'B' },
  // 709
  { q: "有關「糖尿病患者「SGLT-2抑制劑」的「Fournier壞疽（壞死性筋膜炎）」風險」，下列何者正確？", opts:["Fournier壞疽與SGLT-2抑制劑無關","SGLT-2抑制劑使用者有極罕見但嚴重的Fournier壞疽風險，出現會陰部疼痛、紅腫、發燒需立即就醫","Fournier壞疽只在女性發生","所有降血糖藥均有此風險"], ans:'B' },
  // 710

// ============================================================
// QUIZ ENGINE
// ============================================================
let quizQuestions = [];
let currentIdx = 0;
let score = 0;
let answered = 0;
let results = []; // {q, opts, ans, userAns, correct}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init() {
  document.getElementById('totalQNum').textContent = QUESTIONS.length;
}

function startQuiz() {
  quizQuestions = shuffle(QUESTIONS).slice(0, Math.min(50, QUESTIONS.length));
  currentIdx = 0;
  score = 0;
  answered = 0;
  results = [];
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  loadQuestion();
}

function loadQuestion() {
  const q = quizQuestions[currentIdx];
  const total = quizQuestions.length;

  document.getElementById('qNum').textContent = `題目 ${currentIdx + 1} / ${total}`;
  document.getElementById('progressLabel').textContent = `第 ${currentIdx + 1} 題，共 ${total} 題`;
  document.getElementById('scoreLabel').textContent = `得分：${score} / ${answered}`;
  document.getElementById('progressFill').style.width = `${(currentIdx / total) * 100}%`;

  // Clean question text (remove option text embedded)
  let qText = q.q.split('\n')[0];
  document.getElementById('qText').textContent = qText;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const keys = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    if (!opt) return;
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="opt-key">${keys[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(keys[i], q.ans, btn);
    container.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
}

function selectAnswer(selected, correct, clickedBtn) {
  // Disable all options
  document.querySelectorAll('.option').forEach(b => b.disabled = true);

  const keys = ['A', 'B', 'C', 'D'];
  const options = document.querySelectorAll('.option');
  const correctIdx = keys.indexOf(correct);
  const selectedIdx = keys.indexOf(selected);

  answered++;
  const isCorrect = selected === correct;
  if (isCorrect) score++;

  if (isCorrect) {
    clickedBtn.classList.add('correct');
  } else {
    clickedBtn.classList.add('wrong');
    if (options[correctIdx]) options[correctIdx].classList.add('correct');
  }

  const fb = document.getElementById('feedback');
  fb.textContent = isCorrect ? `✅ 正確！答案是 ${correct}` : `❌ 答錯了！正確答案是 ${correct}`;
  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;

  // Save result
  results.push({
    q: quizQuestions[currentIdx],
    userAns: selected,
    correct: isCorrect
  });

  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('scoreLabel').textContent = `得分：${score} / ${answered}`;
}

function skipQuestion() {
  results.push({ q: quizQuestions[currentIdx], userAns: null, correct: false });
  nextQuestion(true);
}

function nextQuestion(skipped = false) {
  currentIdx++;
  if (currentIdx >= quizQuestions.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');

  const total = quizQuestions.length;
  const wrongCount = results.filter(r => !r.correct && r.userAns !== null).length;
  const skipCount = results.filter(r => r.userAns === null).length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalDen').textContent = `/ ${total}`;
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = wrongCount;
  document.getElementById('skipCount').textContent = skipCount;

  const circle = document.getElementById('scoreCircle');
  let grade, msg, color;
  if (pct >= 90) { grade = '🏆 優秀'; msg = '成績非常優異！繼續保持！'; color = '#27ae60'; }
  else if (pct >= 80) { grade = '🎖 良好'; msg = '表現良好，再加油！'; color = '#2980b9'; }
  else if (pct >= 70) { grade = '📚 及格'; msg = '達到及格標準，繼續努力！'; color = '#e67e22'; }
  else if (pct >= 60) { grade = '⚠️ 尚可'; msg = '需要加強複習！'; color = '#e74c3c'; }
  else { grade = '❌ 不及格'; msg = '建議重新閱讀考古題！'; color = '#c0392b'; }

  circle.style.borderColor = color;
  circle.querySelector('.score-num').style.color = color;
  document.getElementById('resultGrade').textContent = `${grade}（${pct}%）`;
  document.getElementById('resultMsg').textContent = msg;
}

function toggleReview() {
  const sec = document.getElementById('reviewSection');
  if (sec.style.display === 'none') {
    sec.style.display = 'block';
    buildReview();
  } else {
    sec.style.display = 'none';
  }
}

function buildReview() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  const keys = ['A', 'B', 'C', 'D'];
  results.forEach((r, i) => {
    if (r.correct) return; // Only show wrong/skipped
    const div = document.createElement('div');
    div.className = `review-item ${r.correct ? 'r-correct' : 'r-wrong'}`;
    const qText = r.q.q.split('\n')[0];
    const userLabel = r.userAns ? `<span class="wrong-ans">${r.userAns}. ${r.q.opts[keys.indexOf(r.userAns)]}</span>` : '<span style="color:#aaa">（略過）</span>';
    const correctLabel = `<span class="correct-ans">${r.q.ans}. ${r.q.opts[keys.indexOf(r.q.ans)]}</span>`;
    div.innerHTML = `
      <div class="r-q"><strong>第${i+1}題：</strong>${qText}</div>
      <div class="r-ans">您的答案：${userLabel}<br>正確答案：${correctLabel}</div>
    `;
    list.appendChild(div);
  });
  if (list.children.length === 0) {
    list.innerHTML = '<p style="color:#27ae60;text-align:center;padding:20px">🎉 您全部答對！</p>';
  }
}

function restartQuiz() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('reviewSection').style.display = 'none';
  startQuiz();
}

init();
</script>
